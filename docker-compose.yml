version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ledgerbill_db
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ledgerbill_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ledgerbill_web
    command: sh -c "uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8090:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-insecure-key-change-in-production
      - DATABASE_URL=postgres://billing_user:billing_pass@db:5432/billing_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
